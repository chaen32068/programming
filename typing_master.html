<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Master Pro</title>
    <style>
        :root { --primary: #6366f1; --correct: #10b981; --wrong: #ef4444; --bg: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
        body { height: 100vh; display: flex; justify-content: center; align-items: center; background: var(--bg); }
        .container { background: white; width: 100%; max-width: 750px; padding: 40px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); text-align: center; }

        /* 언어 선택 탭 */
        .lang-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .tab-btn { padding: 10px 20px; border-radius: 10px; border: 2px solid #e2e8f0; background: white; cursor: pointer; font-weight: 700; transition: 0.3s; color: #94a3b8; }
        .tab-btn.active { border-color: var(--primary); color: var(--primary); background: #f5f7ff; }

        .stats { display: flex; justify-content: space-around; margin-bottom: 30px; }
        .stat-item b { font-size: 2.2rem; color: var(--primary); display: block; }
        .stat-item span { font-size: 0.8rem; color: #94a3b8; font-weight: 700; }

        .quote-display { 
            font-size: 1.6rem; line-height: 1.8; margin-bottom: 25px; min-height: 120px; 
            padding: 25px; background: #f1f5f9; border-radius: 20px; text-align: left; 
            word-break: keep-all; 
        }
        .char { color: #94a3b8; }
        .char.correct { color: #1e293b; }
        .char.incorrect { color: var(--wrong); background: #fee2e2; border-radius: 4px; }
        .char.current { border-bottom: 3px solid var(--primary); color: #1e293b; }

        .input-area { 
            width: 100%; padding: 20px; border: 2px solid #e2e8f0; border-radius: 20px;
            font-size: 1.3rem; outline: none; transition: 0.3s; resize: none;
        }
        .input-area:focus { border-color: var(--primary); box-shadow: 0 0 0 5px rgba(99, 102, 241, 0.1); }

        .btn-reset { margin-top: 25px; padding: 12px 30px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <!-- 언어 선택 버튼 -->
    <div class="lang-tabs">
        <button class="tab-btn active" onclick="setLanguage('ko')">한국어</button>
        <button class="tab-btn" onclick="setLanguage('en')">English</button>
    </div>

    <div class="stats">
        <div class="stat-item"><b id="speed">0</b><span id="speed-label">타수 (타/분)</span></div>
        <div class="stat-item"><b id="accuracy">100</b><span>정확도 (%)</span></div>
        <div class="stat-item"><b id="timer">0</b><span>시간 (초)</span></div>
    </div>

    <div class="quote-display" id="quoteDisplay"></div>
    <textarea id="quoteInput" class="input-area" placeholder="입력을 시작하면 타이머가 작동합니다..." autofocus></textarea>

    <button class="btn-reset" onclick="resetGame()">다른 문장</button>
</div>

<script>
    const quoteDisplay = document.getElementById('quoteDisplay');
    const quoteInput = document.getElementById('quoteInput');
    const speedEl = document.getElementById('speed');
    const speedLabel = document.getElementById('speed-label');
    const accuracyEl = document.getElementById('accuracy');
    const timerEl = document.getElementById('timer');

    const quotes = {
        ko: [
            "별 헤는 밤, 하늘에는 아름다운 별들로 가득합니다.",
            "성공은 최종적인 것이 아니며 실패는 치명적인 것이 아니다.",
            "가장 큰 위험은 위험을 감수하지 않는 것이다.",
            "삶이 있는 한 희망은 항상 곁에 있다."
        ],
        en: [
            "The quick brown fox jumps over the lazy dog.",
            "Success is not final, failure is not fatal.",
            "The only way to do great work is to love what you do.",
            "Life is what happens when you are busy making other plans."
        ]
    };

    let currentLang = 'ko';
    let timer = 0;
    let interval = null;
    let isStarted = false;

    function setLanguage(lang) {
        currentLang = lang;
        // 버튼 활성화 스타일 변경
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText.includes(lang === 'ko' ? '한국어' : 'English'));
        });
        // 라벨 변경
        speedLabel.innerText = lang === 'ko' ? "타수 (타/분)" : "속도 (WPM)";
        resetGame();
    }

    function renderQuote() {
        const list = quotes[currentLang];
        const quote = list[Math.floor(Math.random() * list.length)];
        quoteDisplay.innerHTML = '';
        quote.split('').forEach(char => {
            const span = document.createElement('span');
            span.innerText = char;
            span.classList.add('char');
            quoteDisplay.appendChild(span);
        });
        quoteInput.value = '';
    }

    quoteInput.addEventListener('input', () => {
        if (!isStarted && quoteInput.value.length > 0) startTimer();

        const spans = quoteDisplay.querySelectorAll('.char');
        const vals = quoteInput.value.split('');
        let correct = 0;

        spans.forEach((span, i) => {
            span.classList.remove('current');
            if (vals[i] == null) {
                span.classList.remove('correct', 'incorrect');
                if (i === vals.length) span.classList.add('current');
            } else if (vals[i] === span.innerText) {
                span.classList.add('correct', 'incorrect'); // incorrect 제거용
                span.classList.remove('incorrect');
                correct++;
            } else {
                span.classList.remove('correct');
                span.classList.add('incorrect');
            }
        });

        // 정확도
        if (vals.length > 0) accuracyEl.innerText = Math.floor((correct / vals.length) * 100);

        // 완료 시
        if (quoteInput.value === quoteDisplay.innerText) {
            clearInterval(interval);
            setTimeout(() => {
                alert(`완료! 측정 결과: ${speedEl.innerText}${speedLabel.innerText.split(' ')[0]}`);
                resetGame();
            }, 100);
        }
    });

    function startTimer() {
        isStarted = true;
        timer = 0;
        interval = setInterval(() => {
            timer++;
            timerEl.innerText = timer;
            calculateSpeed();
        }, 1000);
    }

    function calculateSpeed() {
        if (timer === 0) return;
        const len = quoteInput.value.length;
        if (currentLang === 'ko') {
            // 한글 타수 보정 (글자수 * 2.5 / 분)
            speedEl.innerText = Math.floor((len * 2.5) / (timer / 60));
        } else {
            // 영어 WPM (단어수 / 분)
            speedEl.innerText = Math.floor((len / 5) / (timer / 60));
        }
    }

    function resetGame() {
        clearInterval(interval);
        isStarted = false;
        timer = 0;
        timerEl.innerText = 0;
        speedEl.innerText = 0;
        accuracyEl.innerText = 100;
        renderQuote();
        quoteInput.focus();
    }

    renderQuote();
</script>
</body>
</html>
