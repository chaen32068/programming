<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>👾 반응형 픽셀 마스터</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --primary: #6366f1;
            --text: #333;
            --border: #dee2e6;
        }

        body.dark-mode {
            --bg: #1a1a2e;
            --card: #16213e;
            --primary: #4ecca3;
            --text: #e94560;
            --border: #0f3460;
        }

        /* 기본 설정 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            touch-action: none;
        }

        /* 스크롤 방지 필수 */
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            background: var(--card);
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 420px;
            /* 모바일 폭에 맞춤 */
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        /* 도구함 레이아웃 */
        .controls {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .color-wrapper {
            grid-column: span 2;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        input[type="color"] {
            width: 50px;
            height: 35px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: none;
        }

        .btn {
            padding: 10px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            background: var(--card);
            color: var(--text);
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* 🖼️ 반응형 캔버스 그리드 */
        .canvas-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            /* 정사각형 유지 */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            margin-bottom: 15px;
        }

        #pixel-canvas {
            display: grid;
            border: 1px solid var(--border);
            background-color: #eee;
            gap: 1px;
            /* 픽셀 크기는 JS에서 화면 비율에 맞게 계산 */
        }

        .cell {
            background-color: white;
            width: 100%;
            height: 100%;
        }

        /* 하단 버튼 */
        .footer-btns {
            display: flex;
            gap: 8px;
        }

        .footer-btns .btn {
            flex: 1;
        }

        #download-btn {
            background: #333;
            color: white;
            border: none;
        }

        /* 모바일용 안내 */
        .tip {
            font-size: 0.75rem;
            color: #888;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>👾 Pixel Art</h1>

        <div class="controls">
            <div class="color-wrapper">
                <label style="font-size: 0.8rem; font-weight: bold;">색상:</label>
                <input type="color" id="color-picker" value="#6366f1">
            </div>
            <button class="btn active" id="draw-mode">✏️ 그리기</button>
            <button class="btn" id="erase-mode">🧽 지우개</button>
        </div>

        <div class="canvas-container">
            <div id="pixel-canvas"></div>
        </div>

        <div class="footer-btns">
            <button class="btn" id="clear-btn">🗑️ 초기화</button>
            <button class="btn" id="download-btn">💾 저장</button>
        </div>

        <p class="tip">모바일에서는 손가락으로 문지르면 그려져요!</p>
    </div>

    <!-- 캡처 라이브러리 -->
    <script src="https://html2canvas.hertzen.com"></script>

    <script>
        const canvas = document.getElementById('pixel-canvas');
        const colorPicker = document.getElementById('color-picker');
        const drawBtn = document.getElementById('draw-mode');
        const eraseBtn = document.getElementById('erase-mode');
        const clearBtn = document.getElementById('clear-btn');
        const downloadBtn = document.getElementById('download-btn');

        let isDrawing = false;
        let currentMode = 'draw';
        const gridSize = 16; // 16x16

        function initCanvas() {
            // 부모 컨테이너 너비에 맞춰 픽셀 크기 결정
            const containerWidth = document.querySelector('.canvas-container').clientWidth;
            const cellSize = Math.floor((containerWidth - gridSize) / gridSize);

            canvas.style.gridTemplateColumns = `repeat(${gridSize}, ${cellSize}px)`;
            canvas.style.gridTemplateRows = `repeat(${gridSize}, ${cellSize}px)`;

            for (let i = 0; i < gridSize * gridSize; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');

                // 🖱️ 마우스 이벤트
                cell.addEventListener('mousedown', (e) => { isDrawing = true; paint(e.target); });
                cell.addEventListener('mouseover', (e) => { if (isDrawing) paint(e.target); });

                // 📱 터치 이벤트 (모바일 반응형 핵심)
                cell.addEventListener('touchstart', (e) => {
                    isDrawing = true;
                    paint(e.target);
                    e.preventDefault();
                }, { passive: false });

                canvas.appendChild(cell);
            }
        }

        // 터치 이동 중 그리기 (좌표 계산 필요)
        canvas.addEventListener('touchmove', (e) => {
            if (!isDrawing) return;
            const touch = e.touches[0];
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            if (target && target.classList.contains('cell')) {
                paint(target);
            }
            e.preventDefault();
        }, { passive: false });

        window.addEventListener('touchend', () => isDrawing = false);
        window.addEventListener('mouseup', () => isDrawing = false);

        function paint(cell) {
            cell.style.backgroundColor = (currentMode === 'draw') ? colorPicker.value : 'white';
        }

        // 모드 전환
        drawBtn.addEventListener('click', () => { currentMode = 'draw'; drawBtn.classList.add('active'); eraseBtn.classList.remove('active'); });
        eraseBtn.addEventListener('click', () => { currentMode = 'erase'; eraseBtn.classList.add('active'); drawBtn.classList.remove('active'); });

        // 초기화
        clearBtn.addEventListener('click', () => {
            if (confirm("그림을 모두 지울까요?")) {
                document.querySelectorAll('.cell').forEach(c => c.style.backgroundColor = 'white');
            }
        });

        // 이미지 저장
        downloadBtn.addEventListener('click', () => {
            html2canvas(canvas).then(canvasElement => {
                const link = document.createElement('a');
                link.download = 'pixel-art.png';
                link.href = canvasElement.toDataURL();
                link.click();
            });
        });

        window.onload = initCanvas;
    </script>

</body>

</html>
