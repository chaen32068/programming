<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senior Lead Publisher | Visual Archive</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net">
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #050505;
            --card: #0f1115;
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-sub: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Pretendard', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* 커서 */
        .cursor {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10001;
        }

        .cursor-follower {
            width: 35px;
            height: 35px;
            border: 1px solid var(--primary);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transition: transform 0.15s ease-out;
        }

        /* 메인 비주얼 */
        .main-visual {
            height: 50vh;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
            justify-content: center;
            text-align: center;
        }

        .main-title h1 {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 900;
            letter-spacing: -4px;
        }

        .main-title .point {
            color: var(--primary);
            text-shadow: 0 0 30px rgba(59, 130, 246, 0.4);
        }

        /* 그리드 레이아웃 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px 100px;
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        /* 프로젝트 카드 */
        .project-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            position: relative;
            transition: 0.4s;
            overflow: hidden;
            height: 320px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .project-card:hover {
            border-color: var(--primary);
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .p-date {
            font-size: 12px;
            color: var(--primary);
            font-weight: 800;
            margin-bottom: 10px;
            display: block;
        }

        .p-comp {
            font-size: 14px;
            color: var(--text-sub);
            margin-bottom: 5px;
        }

        .p-title {
            font-size: 24px;
            font-weight: 800;
            line-height: 1.3;
        }

        .view-btn {
            font-size: 12px;
            color: var(--text-sub);
            text-decoration: underline;
            margin-top: 20px;
        }

        /* 모달 팝업 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(15px);
        }

        .modal-content {
            background: #111;
            width: 95%;
            max-width: 900px;
            max-height: 90vh;
            border-radius: 32px;
            padding: 0;
            position: relative;
            overflow-y: auto;
            border: 1px solid var(--border);
            transform: translateY(50px);
            opacity: 0;
            transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .modal.active {
            display: flex;
        }

        .modal.active .modal-content {
            transform: translateY(0);
            opacity: 1;
        }

        /* 모달 내부 이미지 */
        .modal-img-wrap {
            width: 100%;
            height: 450px;
            background: #222;
            overflow: hidden;
            position: relative;
        }

        .modal-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-bottom: 1px solid var(--border);
        }

        .modal-body {
            padding: 50px;
        }

        .close-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            font-size: 32px;
            color: #fff;
            border: none;
            background: rgba(0, 0, 0, 0.5);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            z-index: 10;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-title {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 25px;
            color: var(--primary);
        }

        .modal-list {
            list-style: none;
            margin-bottom: 40px;
            border-top: 1px solid var(--border);
            padding-top: 25px;
        }

        .modal-list li {
            margin-bottom: 15px;
            padding-left: 25px;
            position: relative;
            color: #ccc;
            font-size: 16px;
        }

        .modal-list li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: var(--primary);
            font-weight: bold;
        }

        .tag-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .tag {
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 15px;
            border-radius: 8px;
            font-size: 13px;
            color: #888;
            border: 1px solid var(--border);
        }

        .tag-label {
            font-size: 11px;
            color: var(--primary);
            font-weight: bold;
            margin-bottom: 8px;
            display: block;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .modal-img-wrap {
                height: 250px;
            }

            .modal-body {
                padding: 30px;
            }

            .modal-title {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>

    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <header class="main-visual">
        <div class="main-title">
            <h1>PROJECT <span class="point">ARCHIVE.</span></h1>
            <p style="margin-top:20px; color:var(--text-sub);">6년 차 리드 퍼블리셔의 시각적 기록 (카드를 클릭하세요)</p>
        </div>
    </header>

    <div class="container">
        <div class="project-grid" id="grid-container">
            <!-- JS에서 카드를 생성합니다 -->
        </div>
    </div>

    <!-- 모달 레이아웃 -->
    <div class="modal" id="modal" onclick="if(event.target == this) closeModal()">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">×</button>
            <div class="modal-img-wrap" id="modal-img-container">
                <!-- 이미지 삽입 위치 -->
            </div>
            <div class="modal-body" id="modal-data">
                <!-- 텍스트 데이터 삽입 위치 -->
            </div>
        </div>
    </div>

    <script>
        // 프로젝트 통합 데이터
        const projectData = {
            asiana: {
                id: "asiana", date: "2025.07 — PRESENT", comp: "아시아나항공 (메가존)",
                title: "공식 웹사이트 글로벌 운영 총괄",
                img: "https://images.unsplash.com", // 대체 이미지
                list: [
                    "아시아나항공 국내/해외 공식 웹사이트 콘텐츠 퍼블리싱 전반 담당",
                    "UI 컴포넌트 구조 정비 및 웹 접근성(WA) 정기 검토",
                    "다국어 콘텐츠 관리 및 운영 프로세스 개선 주도",
                    "반응형 구조와 브랜딩 가이드 적용으로 브랜드 이미지 강화"
                ],
                tech: ["html", "css", "jQuery", "Javascript"],
                tools: ["ps", "SVN", "Microsoft Teams"]
            },
            bc: {
                id: "bc", date: "2023.01 — 2023.07", comp: "비씨카드 (매그넘빈트)",
                title: "페이북 및 패밀리 사이트 운영",
                img: "/img/페이북.png", // 요청하신 이미지 경로 적용
                list: [
                    "메인 사이트(페이북) 및 5개 패밀리 사이트 마이그레이션",
                    "신규 콘텐츠 퍼블리싱 및 컴포넌트 정비",
                    "금융권 접근성/표준성 준수 검토 및 품질 향상"
                ],
                tech: ["html5", "css3", "jQuery", "javascript"],
                tools: ["slack", "notion", "sourcetree", "svn"]
            },
            lg: {
                id: "lg", date: "2023.08 — 2025.07", comp: "LG전자",
                title: "LG ThinQ 앱/웹 구축 및 리드",
                img: "https://images.unsplash.com",
                list: [
                    "웹 퍼블리싱 팀 리딩 및 프로젝트 일정/산출물 검수 총괄",
                    "LG ThinQ 앱/웹 반응형 콘텐츠 구축 및 유지보수",
                    "서비스 매니저 및 상담사 응대 가이드 콘텐츠 개발"
                ],
                tech: ["html5", "css3", "jQuery", "javascript"],
                tools: ["Jira", "ALM", "GitLab", "Teams"]
            },
            sdi: {
                id: "sdi", date: "2022.09 — 2023.01", comp: "삼성 SDI (펜타브리드)",
                title: "삼성 SDI 공식 웹사이트 구축",
                img: "https://images.unsplash.com",
                list: [
                    "기업형 대규모 사이트 정밀 퍼블리싱 및 인터랙션 구현",
                    "협업툴 기반 작업 계획 수립 및 공정 관리"
                ],
                tech: ["html5", "css3", "jQuery", "javascript"],
                tools: ["ps", "ai", "Figma", "Zeplin"]
            },
            space: {
                id: "space", date: "2022.05 — 2022.07", comp: "나만의 공간",
                title: "서비스 런칭 및 인하우스 툴 개발",
                img: "https://images.unsplash.com",
                list: [
                    "나만의 공간 전체 웹 구조 설계 및 Cafe24 기반 환경 최적화",
                    "관리자 페이지 UI 및 자사 인하우스 툴 컴포넌트 라이브러리 개발"
                ],
                tech: ["html5", "css3", "php", "Cafe24"],
                tools: ["slack", "notion", "svn"]
            }
        };

        // 카드 자동 생성
        const grid = document.getElementById('grid-container');
        Object.values(projectData).forEach(p => {
            const card = document.createElement('div');
            card.className = "project-card hover-target";
            card.onclick = () => openModal(p.id);
            card.innerHTML = `
            <div>
                <span class="p-date">${p.date}</span>
                <p class="p-comp">${p.comp}</p>
                <h2 class="p-title">${p.title}</h2>
            </div>
            <span class="view-btn">View Details</span>
        `;
            grid.appendChild(card);
        });

        // 모달 제어
        function openModal(id) {
            const p = projectData[id];
            document.getElementById('modal-img-container').innerHTML = `<img src="${p.img}" alt="${p.title}" onerror="this.src='https://via.placeholder.com'">`;

            let html = `
            <h2 class="modal-title">${p.title}</h2>
            <span class="tag-label">Tech Stack</span>
            <div class="tag-group">${p.tech.map(t => `<span class="tag">${t}</span>`).join('')}</div>
            <span class="tag-label">Collaboration Tools</span>
            <div class="tag-group">${p.tools.map(tool => `<span class="tag">${tool}</span>`).join('')}</div>
            <ul class="modal-list">${p.list.map(li => `<li>${li}</li>`).join('')}</ul>
        `;

            document.getElementById('modal-data').innerHTML = html;
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // 커서 인터랙션
        const cursor = document.querySelector('.cursor');
        const follower = document.querySelector('.cursor-follower');
        window.addEventListener('mousemove', (e) => {
            cursor.style.transform = `translate3d(${e.clientX - 4}px, ${e.clientY - 4}px, 0)`;
            follower.style.transform = `translate3d(${e.clientX - 17}px, ${e.clientY - 17}px, 0)`;
        });
    </script>
</body>

</html>
