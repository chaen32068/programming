<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌈 감성 무드 다이어리</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root {
            /* 라이트 모드: 따뜻한 바닐라 크림 */
            --bg: #fdfcf0;
            --card: #ffffff;
            --primary: #ffbd00;
            --text: #333333;
            --text-sub: #888888;
            --border: #eeeeee;
            --input-bg: #ffffff;
        }

        /* 🌙 개선된 다크 모드: 너무 어둡지 않은 '딥 블루 그레이' */
        body.dark-mode {
            --bg: #32353b;
            /* 배경을 좀 더 밝은 그레이로 */
            --card: #3f4248;
            /* 카드는 더 밝게 해서 입체감 부여 */
            --primary: #ffcc33;
            --text: #eef0f2;
            --text-sub: #b0b3b8;
            --border: #4e525a;
            --input-bg: #4e525a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background 0.3s, color 0.3s;
        }

        body {
            font-family: 'Nanum Gothic', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 550px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-family: 'Nanum Brush Script', cursive;
            font-size: 3.2rem;
            color: var(--primary);
        }

        .mode-toggle {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 10px 16px;
            border-radius: 25px;
            cursor: pointer;
            color: var(--text);
            font-size: 0.85rem;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .diary-card {
            background: var(--card);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .emoji-selector {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .emoji-btn {
            font-size: 2.2rem;
            background: none;
            border: 3px solid transparent;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
            padding: 5px;
        }

        .emoji-btn.selected {
            border-color: var(--primary);
            transform: scale(1.15);
            background: rgba(255, 189, 0, 0.1);
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 18px;
            border: 1.5px solid var(--border);
            border-radius: 15px;
            font-size: 1rem;
            margin-bottom: 15px;
            outline: none;
            background: var(--input-bg);
            color: var(--text);
            line-height: 1.6;
        }

        textarea:focus {
            border-color: var(--primary);
        }

        .custom-file-upload {
            display: inline-block;
            padding: 12px 20px;
            cursor: pointer;
            background: var(--border);
            border-radius: 12px;
            font-size: 0.9rem;
            color: var(--text);
            width: 100%;
            text-align: center;
            margin-bottom: 15px;
        }

        input[type="file"] {
            display: none;
        }

        #image-preview {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 15px;
            display: none;
        }

        #save-btn {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            border: none;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
            color: #fff;
        }

        .diary-item {
            background: var(--card);
            padding: 22px;
            border-radius: 22px;
            margin-bottom: 18px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            position: relative;
            border: 1px solid var(--border);
        }

        .diary-top {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .diary-emoji {
            font-size: 2.5rem;
        }

        .diary-date {
            font-size: 0.85rem;
            color: var(--text-sub);
        }

        .diary-text {
            font-size: 1.05rem;
            line-height: 1.7;
            white-space: pre-wrap;
        }

        .diary-img {
            width: 100%;
            border-radius: 14px;
            margin-top: 10px;
        }

        .delete-btn {
            position: absolute;
            top: 18px;
            right: 18px;
            background: rgba(255, 107, 107, 0.15);
            color: #ff6b6b;
            border: none;
            padding: 6px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>

<body class="dark-mode"> <!-- 초기 로드 시 다크모드로 예시 확인 가능 -->

    <div class="container">
        <div class="header">
            <h1>Mood Diary</h1>
            <button class="mode-toggle" id="mode-toggle">☀️ 라이트 모드</button>
        </div>

        <div class="diary-card">
            <div class="emoji-selector">
                <button class="emoji-btn selected" data-emoji="😊">😊</button>
                <button class="emoji-btn" data-emoji="🥰">🥰</button>
                <button class="emoji-btn" data-emoji="😢">😢</button>
                <button class="emoji-btn" data-emoji="😡">😡</button>
                <button class="emoji-btn" data-emoji="😴">😴</button>
            </div>

            <img id="image-preview" src="" alt="미리보기">
            <label for="file-upload" class="custom-file-upload">📸 사진 추가하기</label>
            <input id="file-upload" type="file" accept="image/*">

            <textarea id="diary-input" placeholder="오늘 당신의 이야기는?"></textarea>
            <button id="save-btn">일기 저장하기 ✨</button>
        </div>

        <div id="diary-list"></div>
    </div>

    <script>
        const emojiBtns = document.querySelectorAll('.emoji-btn');
        const diaryInput = document.querySelector('#diary-input');
        const saveBtn = document.querySelector('#save-btn');
        const diaryList = document.querySelector('#diary-list');
        const fileUpload = document.querySelector('#file-upload');
        const imagePreview = document.querySelector('#image-preview');
        const modeToggle = document.querySelector('#mode-toggle');

        let selectedEmoji = "😊";
        let selectedImageBase64 = "";

        // 테마 전환 로직
        modeToggle.addEventListener('click', () => {
            const isDark = document.body.classList.toggle('dark-mode');
            modeToggle.innerText = isDark ? "☀️ 라이트 모드" : "🌙 다크 모드";
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        // 이모지 선택
        emojiBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                emojiBtns.forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedEmoji = btn.dataset.emoji;
            });
        });

        // 이미지 처리
        fileUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    selectedImageBase64 = event.target.result;
                    imagePreview.src = selectedImageBase64;
                    imagePreview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        // 저장
        saveBtn.addEventListener('click', () => {
            const text = diaryInput.value.trim();
            if (!text) return alert("내용을 적어주세요!");

            const newEntry = {
                id: Date.now(),
                emoji: selectedEmoji,
                image: selectedImageBase64,
                content: text,
                date: new Date().toLocaleString('ko-KR', { month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' })
            };

            const diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
            diaries.unshift(newEntry);

            try {
                localStorage.setItem('myDiaries', JSON.stringify(diaries));
            } catch (e) {
                alert("사진 용량이 너무 큽니다!");
                return;
            }

            diaryInput.value = "";
            imagePreview.style.display = 'none';
            selectedImageBase64 = "";
            loadDiaries();
        });

        function loadDiaries() {
            const diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
            diaryList.innerHTML = diaries.map(d => `
            <div class="diary-item">
                <button class="delete-btn" onclick="deleteEntry(${d.id})">삭제</button>
                <div class="diary-top">
                    <div class="diary-emoji">${d.emoji}</div>
                    <div class="diary-date">${d.date}</div>
                </div>
                <div class="diary-text">${d.content}</div>
                ${d.image ? `<img src="${d.image}" class="diary-img">` : ''}
            </div>
        `).join('');
        }

        window.deleteEntry = (id) => {
            if (!confirm("정말 삭제할까요?")) return;
            let diaries = JSON.parse(localStorage.getItem('myDiaries') || '[]');
            diaries = diaries.filter(d => d.id !== id);
            localStorage.setItem('myDiaries', JSON.stringify(diaries));
            loadDiaries();
        };

        // 초기 테마 설정 복구
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.remove('dark-mode');
            modeToggle.innerText = "🌙 다크 모드";
        }
        loadDiaries();
    </script>
</body>

</html>
