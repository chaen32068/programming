<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Large D-Day</title>
    <style>
        :root { --primary: #6366f1; --bg: #f3f4f6; --text: #1e293b; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
        body { height: 100vh; display: flex; justify-content: center; align-items: center; background: var(--bg); color: var(--text); }

        /* [메인 카드 - 사이즈 대폭 확대] */
        .card { 
            background: white; 
            width: 500px; /* 기존 340px -> 500px */
            padding: 50px 40px; 
            border-radius: 40px; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.08); 
            text-align: center; 
        }
        h2 { font-size: 2rem; margin-bottom: 35px; font-weight: 900; letter-spacing: -1px; }
        
        .input-group { display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px; }
        input { 
            width: 100%; padding: 22px; border: 2px solid #f1f5f9; border-radius: 20px; 
            font-size: 1.2rem; outline: none; transition: 0.2s; background: #f8fafc;
        }
        input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 5px rgba(99, 102, 241, 0.1); }
        
        .date-container { position: relative; }
        .cal-icon-btn { 
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer; font-size: 1.8rem;
        }

        .btn-main { 
            width: 100%; padding: 22px; background: var(--primary); color: white; 
            border: none; border-radius: 20px; font-weight: 800; font-size: 1.3rem; cursor: pointer; 
            transition: 0.3s;
        }
        .btn-main:hover { filter: brightness(1.1); transform: translateY(-2px); }

        /* [커스텀 달력 팝업 - 사이즈 확대] */
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 100; backdrop-filter: blur(8px); }
        .calendar-popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; width: 400px; padding: 30px; border-radius: 35px; z-index: 101; box-shadow: 0 30px 70px rgba(0,0,0,0.25); }
        
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; font-size: 1.4rem; font-weight: 800; }
        .nav-btn { background: #f1f5f9; border: none; width: 45px; height: 45px; border-radius: 15px; cursor: pointer; font-size: 1.2rem; font-weight: bold; }
        
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; }
        .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 14px; font-size: 1.1rem; font-weight: 600; }
        .day:hover { background: #eef2ff; color: var(--primary); }
        .day.selected { background: var(--primary); color: white; }
        .day.empty { cursor: default; }

        /* [타이머 결과 - 큼직하게] */
        .timer-wrap { display: flex; justify-content: space-between; gap: 15px; margin-top: 20px; }
        .unit { flex: 1; background: #f8fafc; padding: 25px 10px; border-radius: 25px; border: 1px solid #f1f5f9; }
        .unit span { display: block; font-size: 3rem; font-weight: 900; color: var(--primary); line-height: 1.1; }
        .unit label { font-size: 0.8rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-top: 8px; display: block; }
        
        .hidden { display: none !important; }
        .reset-link { margin-top: 35px; display: inline-block; color: #94a3b8; font-size: 1rem; cursor: pointer; text-decoration: underline; border: none; background: none; }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="main-title">D-Day 카운터</h2>
        
        <div id="step-setup">
            <div class="input-group">
                <input type="text" id="event-name" placeholder="이벤트 이름 (예: 퇴사하는 날)">
                <div class="date-container">
                    <input type="text" id="date-input" placeholder="YYYY-MM-DD" maxlength="10">
                    <button class="cal-icon-btn" onclick="toggleModal(true)">📅</button>
                </div>
            </div>
            <button class="btn-main" onclick="initCounter()">카운트다운 시작</button>
        </div>

        <div id="step-result" class="hidden">
            <div class="timer-wrap">
                <div class="unit"><span id="d">00</span><label>Days</label></div>
                <div class="unit"><span id="h">00</span><label>Hours</label></div>
                <div class="unit"><span id="m">00</span><label>Mins</label></div>
                <div class="unit"><span id="s">00</span><label>Secs</label></div>
            </div>
            <button class="reset-link" onclick="location.reload()">새로운 목표 설정하기</button>
        </div>
    </div>

    <!-- 캘린더 모달 -->
    <div id="modal-overlay" onclick="toggleModal(false)"></div>
    <div id="calendar-popup" class="calendar-popup">
        <div class="cal-header">
            <button class="nav-btn" onclick="changeMonth(-1)">&lt;</button>
            <b id="month-label"></b>
            <button class="nav-btn" onclick="changeMonth(1)">&gt;</button>
        </div>
        <div class="days-grid" id="days-grid"></div>
    </div>

<script>
    let selectedDate = null;
    let viewDate = new Date();
    const dateInput = document.getElementById('date-input');

    // 1. 자동 하이픈 로직
    dateInput.addEventListener('keyup', (e) => {
        if (e.key !== 'Backspace') {
            let val = dateInput.value.replace(/[^0-9]/g, '');
            if (val.length > 4) val = val.substring(0, 4) + '-' + val.substring(4);
            if (val.length > 7) val = val.substring(0, 7) + '-' + val.substring(7);
            dateInput.value = val.substring(0, 10);
        }
        if (dateInput.value.length === 10) {
            const temp = new Date(dateInput.value);
            if (!isNaN(temp)) { selectedDate = temp; viewDate = new Date(temp); }
        }
    });

    // 2. 캘린더 제어
    function toggleModal(show) {
        document.getElementById('modal-overlay').style.display = show ? 'block' : 'none';
        document.getElementById('calendar-popup').style.display = show ? 'block' : 'none';
        if(show) renderCalendar();
    }

    function renderCalendar() {
        const grid = document.getElementById('days-grid');
        const label = document.getElementById('month-label');
        grid.innerHTML = '';
        const y = viewDate.getFullYear(), m = viewDate.getMonth();
        label.innerText = `${y}년 ${m + 1}월`;

        const firstDay = new Date(y, m, 1).getDay();
        const lastDate = new Date(y, m + 1, 0).getDate();

        for(let i=0; i<firstDay; i++) grid.innerHTML += '<div class="day empty"></div>';
        for(let d=1; d<=lastDate; d++) {
            const dayEl = document.createElement('div');
            dayEl.className = 'day';
            if(selectedDate && y === selectedDate.getFullYear() && m === selectedDate.getMonth() && d === selectedDate.getDate()) dayEl.classList.add('selected');
            dayEl.innerText = d;
            dayEl.onclick = () => {
                selectedDate = new Date(y, m, d);
                dateInput.value = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                toggleModal(false);
            };
            grid.appendChild(dayEl);
        }
    }

    function changeMonth(step) { viewDate.setMonth(viewDate.getMonth() + step); renderCalendar(); }

    // 3. 타이머 시작
    function initCounter() {
        const name = document.getElementById('event-name').value;
        const dateVal = dateInput.value;
        const finalDate = new Date(dateVal);

        if(!name || isNaN(finalDate)) return alert("정확한 이름과 날짜를 입력해주세요!");

        document.getElementById('main-title').innerText = name;
        document.getElementById('step-setup').classList.add('hidden');
        document.getElementById('step-result').classList.remove('hidden');

        const target = finalDate.setHours(0,0,0,0);
        setInterval(() => {
            const diff = target - new Date();
            if(diff <= 0) {
                document.getElementById('d').innerText = "00";
                return;
            }
            document.getElementById('d').innerText = Math.floor(diff / (1000*60*60*24));
            document.getElementById('h').innerText = String(Math.floor((diff/(1000*60*60))%24)).padStart(2,'0');
            document.getElementById('m').innerText = String(Math.floor((diff/(1000*60))%60)).padStart(2,'0');
            document.getElementById('s').innerText = String(Math.floor((diff/1000)%60)).padStart(2,'0');
        }, 1000);
    }
</script>
</body>
</html>
